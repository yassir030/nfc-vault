---
name: NFC Vault Android Build

workflows:
  android-build:
    name: Android APK Build
    environment:
      xcode: latest
      node: 20
      java: 17
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install dependencies
        npm:
          install: true
        cache:
          - name: node_modules
            path: node_modules
      
      - name: Expo Prebuild
        script: |
          echo "Running Expo prebuild with HCE configuration..."
          npx expo prebuild --platform android
          echo "Prebuild completed successfully!"
      
      - name: Build APK
        script: |
          echo "Building APK with HCE support..."
          cd android
          ./gradlew assembleRelease
          echo "APK build completed!"
        cache:
          - name: gradle
            path: ~/.gradle
    
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    
    publishing:
      email:
        recipients:
          - name: Build completed
            email: your-email@example.com

# Global cache configuration
cache:
  - name: node_modules
    path: node_modules
  - name: gradle
    path: ~/.gradle

# Build machine configuration
machine:
  type: "linux-medium"  # Use Android build machine equivalent
