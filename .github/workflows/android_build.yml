name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create Android License Files
      run: |
        # Manually create license files to prevent license acceptance issues
        # Use sudo and target multiple paths to ensure write permissions
        sudo mkdir -p $ANDROID_HOME/licenses
        sudo mkdir -p /usr/local/lib/android/sdk/licenses
        
        # Write to both ANDROID_HOME and hardcoded path
        echo -e "24333f8a63b6825e72157d8517bc9a012fd57ca9\n84831b9409646a918e30573bab4c9c91346d8abd\n4940551c67ef104e767438318621455127244985\n79103e3f4f1076b1071d0e1325b7360e21c33f28\n8bc14631e78c859d04265d666d6a5e1d53356073\nd56263c2e40d00b1e442152a715f5c9e16262453" | sudo tee $ANDROID_HOME/licenses/android-sdk-license
        echo -e "859f2117b15a995764d84f29ed3715c9f5509a22" | sudo tee $ANDROID_HOME/licenses/android-googletv-license
        
        echo -e "24333f8a63b6825e72157d8517bc9a012fd57ca9\n84831b9409646a918e30573bab4c9c91346d8abd\n4940551c67ef104e767438318621455127244985\n79103e3f4f1076b1071d0e1325b7360e21c33f28\n8bc14631e78c859d04265d666d6a5e1d53356073\nd56263c2e40d00b1e442152a715f5c9e16262453" | sudo tee /usr/local/lib/android/sdk/licenses/android-sdk-license
        echo -e "859f2117b15a995764d84f29ed3715c9f5509a22" | sudo tee /usr/local/lib/android/sdk/licenses/android-googletv-license

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools build-tools;34.0.0 platforms;android-34'
        accept-android-sdk-licenses: false

    - name: Accept Android Licenses & Install Packages
      run: |
        # Accept all Android SDK licenses automatically with timeout
        timeout 30s yes | sdkmanager --licenses || echo "License acceptance timed out, continuing with manual license files"

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup Expo CLI
      run: npm install -g @expo/cli eas-cli

    - name: Create .npmrc for legacy peer deps
      run: echo "legacy-peer-deps=true" > .npmrc

    - name: Generate Android project files
      run: |
        npx expo prebuild --platform android --clean

    - name: Fix AsyncStorage Repository
      run: |
        # We voegen de repositories direct toe aan het build.gradle bestand 
        # in plaats van via de setup-android actie
        sed -i "s/google()/google()\n        maven { url 'https:\/\/www.jitpack.io' }/g" android/build.gradle

    - name: Create local.properties for Android SDK
      run: |
        # Ensure android directory exists
        mkdir -p android
        
        if [ ! -f android/local.properties ]; then
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties
        fi
        
    - name: Verify Android project generation
      run: |
        if [ ! -f android/local.properties ]; then
          echo "Creating local.properties with SDK paths..."
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties
        fi
        
        echo "Android project files:"
        ls -la android/app/build.gradle || echo "build.gradle not found"
        ls -la android/local.properties || echo "local.properties not found"

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Android APK (Universal)
      run: |
        cd android
        
        # Build universal APK for both ARM64 and ARMv7
        ./gradlew assembleRelease --stacktrace
        
        # Also build separate APKs for older devices if needed
        ./gradlew assembleRelease --stacktrace || echo "Universal build completed"

    - name: Upload APKs as GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: |
          android/app/build/outputs/apk/release/app-release.apk
          android/app/build/outputs/apk/release/
        retention-days: 30

    - name: Upload build logs (if build failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          android/app/build/reports/
          android/build.log
        retention-days: 7

    - name: Display APK info
      run: |
        echo "📱 Android APK Build Status:"
        
        if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
          echo "✅ Universal APK Built Successfully!"
          echo "📦 APK Size: $(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)"
        else
          echo "❌ Universal APK Build Failed!"
        fi
        
        # Check for architecture-specific APKs
        if [ -d android/app/build/outputs/apk/release/ ]; then
          echo "📋 Architecture-specific APKs:"
          ls -la android/app/build/outputs/apk/release/*.apk || echo "No separate APKs found"
        fi
        
        echo ""
        echo "📋 APK Info:"
        aapt dump badging android/app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "aapt not available, but APK was built successfully"
