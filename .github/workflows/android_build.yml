name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      id: setup-android
      uses: android-actions/setup-android@v3
      with:
        packages: "ndk;27.1.12297006"
        accept-android-sdk-licenses: false

    - name: Force Accept SDK Licenses
      run: |
        mkdir -p $ANDROID_HOME/licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-v2-
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup Expo CLI
      run: npm install -g @expo/cli eas-cli

    - name: Create .npmrc for legacy peer deps
      run: echo "legacy-peer-deps=true" > .npmrc

    - name: Generate Android project files
      run: |
        npx expo prebuild --platform android --clean

    - name: Fix AsyncStorage Repository
      run: |
        # We voegen de repositories direct toe aan het build.gradle bestand 
        # in plaats van via de setup-android actie
        sed -i "s/google()/google()\n        maven { url 'https:\/\/www.jitpack.io' }/g" android/build.gradle

    - name: Create local.properties for Android SDK
      run: |
        # Ensure android directory exists
        mkdir -p android
        
        if [ ! -f android/local.properties ]; then
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties
        fi
        
    - name: Verify Android project generation
      run: |
        if [ ! -f android/local.properties ]; then
          echo "Creating local.properties with SDK paths..."
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties
        fi
        
        echo "Android project files:"
        ls -la android/app/build.gradle || echo "build.gradle not found"
        ls -la android/local.properties || echo "local.properties not found"

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Validate Gradle wrapper
      run: |
        cd android
        ./gradlew --version

    - name: Debug NDK and Environment
      run: |
        echo "=== NDK Debug Information ==="
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "NDK Version in project: $(grep -r 'ndkVersion' android/build.gradle | cut -d'=' -f2 | tr -d ' "')"
        echo "Available NDK versions:"
        ls -la $ANDROID_HOME/ndk/ || echo "NDK directory not found"
        echo "=== Memory Information ==="
        free -h
        echo "=== Java Information ==="
        java -version

    - name: Build Android APK (Universal)
      run: |
        export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006
        cd android
        
        # Build universal APK for both ARM64 and ARMv7 with detailed logging in daemon-less mode
        ./gradlew assembleRelease --stacktrace --info --no-daemon

    - name: Upload APKs as GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: |
          android/app/build/outputs/apk/release/app-release.apk
          android/app/build/outputs/apk/release/
        retention-days: 30

    - name: Upload build logs (if build failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          android/app/build/reports/
          android/build.log
        retention-days: 7

    - name: Display APK info
      run: |
        echo "📱 Android APK Build Status:"
        
        if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
          echo "✅ Universal APK Built Successfully!"
          echo "📦 APK Size: $(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)"
        else
          echo "❌ Universal APK Build Failed!"
        fi
        
        # Check for architecture-specific APKs
        if [ -d android/app/build/outputs/apk/release/ ]; then
          echo "📋 Architecture-specific APKs:"
          ls -la android/app/build/outputs/apk/release/*.apk || echo "No separate APKs found"
        fi
        
        echo ""
        echo "📋 APK Info:"
        aapt dump badging android/app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "aapt not available, but APK was built successfully"
