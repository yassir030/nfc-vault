name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      run: |
        # Install Android SDK and command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip -d $HOME/cmdline-tools
        echo "export ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
        echo "export PATH=$PATH:$HOME/cmdline-tools/cmdline-tools/bin:$HOME/Android/Sdk/cmdline-tools/latest/bin:$HOME/Android/Sdk/platform-tools:$HOME/Android/Sdk/build-tools/34.0.0" >> $GITHUB_ENV
        
        # Install required Android SDK components
        yes | $HOME/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/Android/Sdk "platform-tools" "build-tools;34.0.0" "platforms;android-34"
        
        # Accept all Android SDK licenses automatically
        yes | $HOME/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses --sdk_root=$HOME/Android/Sdk

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup Expo CLI
      run: npm install -g @expo/cli eas-cli

    - name: Create .npmrc for legacy peer deps
      run: echo "legacy-peer-deps=true" > .npmrc

    - name: Generate Android project files
      run: |
        npx expo prebuild --platform android --clean

    - name: Create local.properties for Android SDK
      run: |
        # Ensure android directory exists
        mkdir -p android
        
        if [ ! -f android/local.properties ]; then
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties
        fi
        
    - name: Verify Android project generation
      run: |
        if [ ! -f android/local.properties ]; then
          echo "Creating local.properties with SDK paths..."
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties
        fi
        
        echo "Android project files:"
        ls -la android/app/build.gradle || echo "build.gradle not found"
        ls -la android/local.properties || echo "local.properties not found"

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Android APK (Universal)
      run: |
        cd android
        
        # Build universal APK for both ARM64 and ARMv7
        ./gradlew assembleRelease --stacktrace
        
        # Also build separate APKs for older devices if needed
        ./gradlew assembleRelease --stacktrace || echo "Universal build completed"

    - name: Upload APKs as GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: |
          android/app/build/outputs/apk/release/app-release.apk
          android/app/build/outputs/apk/release/
        retention-days: 30

    - name: Upload build logs (if build failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          android/app/build/reports/
          android/build.log
        retention-days: 7

    - name: Display APK info
      run: |
        echo "📱 Android APK Build Status:"
        
        if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
          echo "✅ Universal APK Built Successfully!"
          echo "📦 APK Size: $(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)"
        else
          echo "❌ Universal APK Build Failed!"
        fi
        
        # Check for architecture-specific APKs
        if [ -d android/app/build/outputs/apk/release/ ]; then
          echo "📋 Architecture-specific APKs:"
          ls -la android/app/build/outputs/apk/release/*.apk || echo "No separate APKs found"
        fi
        
        echo ""
        echo "📋 APK Info:"
        aapt dump badging android/app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "aapt not available, but APK was built successfully"
